<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  
<!-- WELCOME-NOCOMMENT -->
<script>
window.addEventListener("load",function(){

 const box=document.createElement("div");
 box.innerText="Welcome back to Nocomment";

 box.style.position="fixed";
 box.style.top="20px";
 box.style.right="20px";
 box.style.padding="12px 18px";
 box.style.background="rgba(10,20,35,.95)";
 box.style.color="#fff";
 box.style.fontWeight="700";
 box.style.borderRadius="10px";
 box.style.boxShadow="0 10px 25px rgba(0,0,0,.35)";
 box.style.zIndex="99999";
 box.style.fontSize="14px";
 box.style.transition="opacity .4s";

 document.body.appendChild(box);

 setTimeout(()=>{
  box.style.opacity="0";
  setTimeout(()=>box.remove(),400);
 },3000);

});
</script>
<!-- WELCOME-NOCOMMENT-START -->
<style>
  #ncWelcomeOverlay{
    position:fixed;
    inset:0;
    z-index:999999;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    background:radial-gradient(circle at center, rgba(255,255,255,.05), rgba(0,0,0,.18));
    animation:ncFadeBackdropIn .28s ease-out both;
  }

  #ncWelcomeCard{
    position:relative;
    min-width:420px;
    max-width:min(78vw, 760px);
    padding:28px 42px;
    border-radius:28px;
    border:1px solid rgba(255,255,255,.20);
    background:
      linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08)),
      linear-gradient(135deg, rgba(20,35,60,.92), rgba(10,18,32,.88));
    box-shadow:
      0 30px 80px rgba(0,0,0,.38),
      inset 0 1px 0 rgba(255,255,255,.22),
      inset 0 -1px 0 rgba(255,255,255,.06),
      0 0 40px rgba(120,180,255,.12);
    color:#f3f8ff;
    text-align:center;
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    overflow:hidden;
    transform-origin:center center;
    animation:ncWelcomeIn .52s cubic-bezier(.2,.9,.2,1) both;
  }

  #ncWelcomeCard::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(120deg, rgba(255,255,255,.16), transparent 28%, transparent 72%, rgba(255,255,255,.08)),
      radial-gradient(circle at 20% 18%, rgba(130,190,255,.20), transparent 24%),
      radial-gradient(circle at 80% 82%, rgba(110,255,215,.10), transparent 28%);
    mix-blend-mode:screen;
  }

  #ncWelcomeCard::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    border-radius:inherit;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.07);
  }

  #ncWelcomeTitle{
    position:relative;
    z-index:2;
    margin:0;
    font-size:clamp(30px, 3vw, 44px);
    line-height:1.04;
    font-weight:900;
    letter-spacing:.01em;
    text-shadow:
      0 2px 12px rgba(0,0,0,.22),
      0 0 26px rgba(130,190,255,.10);
  }

  #ncWelcomeSub{
    position:relative;
    z-index:2;
    margin-top:10px;
    font-size:clamp(13px, 1.2vw, 16px);
    line-height:1.45;
    color:rgba(235,243,255,.76);
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
  }

  #ncWelcomeShards{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0;
  }

  .ncShard{
    position:absolute;
    width:18%;
    height:22%;
    border:1px solid rgba(255,255,255,.18);
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.04));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.15),
      0 10px 18px rgba(0,0,0,.14);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    clip-path:polygon(18% 0%, 100% 8%, 82% 100%, 0% 86%);
    border-radius:6px;
  }

  .ncShard:nth-child(1){ left:8%;  top:14%; }
  .ncShard:nth-child(2){ left:30%; top:8%;  width:15%; height:18%; }
  .ncShard:nth-child(3){ left:52%; top:12%; width:16%; height:20%; }
  .ncShard:nth-child(4){ left:74%; top:16%; width:14%; height:18%; }
  .ncShard:nth-child(5){ left:12%; top:44%; width:14%; height:19%; }
  .ncShard:nth-child(6){ left:34%; top:40%; width:17%; height:21%; }
  .ncShard:nth-child(7){ left:58%; top:42%; width:14%; height:19%; }
  .ncShard:nth-child(8){ left:78%; top:46%; width:12%; height:17%; }
  .ncShard:nth-child(9){ left:20%; top:68%; width:14%; height:18%; }
  .ncShard:nth-child(10){left:44%; top:70%; width:16%; height:19%; }
  .ncShard:nth-child(11){left:66%; top:66%; width:15%; height:18%; }

  #ncWelcomeOverlay.is-breaking #ncWelcomeCard{
    animation:ncGlassBreak .86s cubic-bezier(.2,.8,.2,1) forwards;
  }

  #ncWelcomeOverlay.is-breaking #ncWelcomeShards{
    opacity:1;
  }

  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(1){ animation:ncShard1 .95s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(2){ animation:ncShard2 .88s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(3){ animation:ncShard3 .92s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(4){ animation:ncShard4 .90s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(5){ animation:ncShard5 .98s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(6){ animation:ncShard6 1.00s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(7){ animation:ncShard7 .94s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(8){ animation:ncShard8 .90s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(9){ animation:ncShard9 .96s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(10){animation:ncShard10 1.02s ease-out forwards; }
  #ncWelcomeOverlay.is-breaking .ncShard:nth-child(11){animation:ncShard11 .94s ease-out forwards; }

  @keyframes ncFadeBackdropIn{
    from{ opacity:0; }
    to{ opacity:1; }
  }

  @keyframes ncWelcomeIn{
    0%{
      opacity:0;
      transform:translateY(30px) scale(.88);
      filter:blur(10px);
    }
    60%{
      opacity:1;
      transform:translateY(-4px) scale(1.02);
      filter:blur(0);
    }
    100%{
      opacity:1;
      transform:translateY(0) scale(1);
      filter:blur(0);
    }
  }

  @keyframes ncGlassBreak{
    0%{
      opacity:1;
      transform:scale(1) rotate(0deg);
      filter:blur(0);
    }
    18%{
      opacity:1;
      transform:scale(1.02) rotate(.2deg);
    }
    100%{
      opacity:0;
      transform:scale(.92) rotate(-1.2deg);
      filter:blur(4px);
    }
  }

  @keyframes ncShard1  { to { transform:translate(-180px,-120px) rotate(-42deg) scale(.9);  opacity:0; } }
  @keyframes ncShard2  { to { transform:translate(-60px,-150px)  rotate(34deg)  scale(.8);  opacity:0; } }
  @keyframes ncShard3  { to { transform:translate(40px,-140px)   rotate(-28deg) scale(.9);  opacity:0; } }
  @keyframes ncShard4  { to { transform:translate(170px,-110px)  rotate(38deg)  scale(.85); opacity:0; } }
  @keyframes ncShard5  { to { transform:translate(-220px,10px)   rotate(-60deg) scale(.9);  opacity:0; } }
  @keyframes ncShard6  { to { transform:translate(-40px,120px)   rotate(55deg)  scale(.85); opacity:0; } }
  @keyframes ncShard7  { to { transform:translate(110px,90px)    rotate(-46deg) scale(.88); opacity:0; } }
  @keyframes ncShard8  { to { transform:translate(220px,20px)    rotate(58deg)  scale(.82); opacity:0; } }
  @keyframes ncShard9  { to { transform:translate(-120px,170px)  rotate(-50deg) scale(.92); opacity:0; } }
  @keyframes ncShard10 { to { transform:translate(20px,190px)    rotate(44deg)  scale(.86); opacity:0; } }
  @keyframes ncShard11 { to { transform:translate(160px,150px)   rotate(-36deg) scale(.84); opacity:0; } }

  @media (max-width: 700px){
    #ncWelcomeCard{
      min-width:0;
      width:min(90vw, 540px);
      padding:22px 20px;
      border-radius:22px;
    }
  }
</style>

<script>
(function(){
  window.addEventListener("load", function(){
    try{
      var old = document.getElementById("ncWelcomeOverlay");
      if (old) old.remove();

      var overlay = document.createElement("div");
      overlay.id = "ncWelcomeOverlay";

      var card = document.createElement("div");
      card.id = "ncWelcomeCard";

      var title = document.createElement("h1");
      title.id = "ncWelcomeTitle";
      title.textContent = "Welcome back to Nocomment";

      var sub = document.createElement("div");
      sub.id = "ncWelcomeSub";
      sub.textContent = "System ready";

      var shards = document.createElement("div");
      shards.id = "ncWelcomeShards";

      for (var i = 0; i < 11; i++) {
        var s = document.createElement("span");
        s.className = "ncShard";
        shards.appendChild(s);
      }

      card.appendChild(title);
      card.appendChild(sub);
      card.appendChild(shards);
      overlay.appendChild(card);
      document.body.appendChild(overlay);

      setTimeout(function(){
        overlay.classList.add("is-breaking");
      }, 4000);

      setTimeout(function(){
        if (overlay && overlay.parentNode) {
          overlay.parentNode.removeChild(overlay);
        }
      }, 5000);
    }catch(e){}
  });
})();
</script>
<!-- WELCOME-NOCOMMENT-END -->
</body>
</html>
